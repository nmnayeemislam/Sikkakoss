name: sikka_kosh
description: "Kids Learning App - a fully offline Flutter learning app for children."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  audioplayers: ^6.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/audio/bangla/
    - assets/audio/english/
    - assets/audio/arabic/
    - assets/audio/numbers/
    - assets/audio/surah/
